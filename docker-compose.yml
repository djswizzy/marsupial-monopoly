services:
  game-server:
    image: marsupial-monopoly-server:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marsupial-monopoly-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Comma-separated list of allowed origins (your Vercel app URL, etc.)
      - ALLOWED_ORIGINS=https://your-app.vercel.app

  ngrok:
    image: ngrok/ngrok:latest
    container_name: marsupial-monopoly-ngrok
    restart: unless-stopped
    command: ["http", "game-server:3001"]
    environment:
      # Get your token from https://dashboard.ngrok.com/get-started/your-authtoken
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - game-server
